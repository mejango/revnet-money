query ActivityEvents($where: activityEventFilter, $orderBy: String, $orderDirection: String) {
  activityEvents(
    where: $where
    orderBy: $orderBy
    orderDirection: $orderDirection
    limit: 1000 # TODO implement paging
  ) {
    items {
      id
      chainId
      timestamp
      txHash
      payEvent {
        id
        amount
        beneficiary
        memo
        timestamp
        feeFromProject
        newlyIssuedTokenCount
        from
        txHash
        amountUsd
        caller
        distributionFromProjectId
        projectId
        project {
          id
          projectId
          handle
          version
        }
      }
      cashOutTokensEvent {
        id
        timestamp
        txHash
        from
        beneficiary
        reclaimAmount
        cashOutCount
        metadata
        project {
          id
          projectId
          handle
          version
        }
      }
      addToBalanceEvent {
        txHash
        timestamp
        from
        amount
        memo
      }
      mintTokensEvent {
        txHash
        timestamp
        from
        caller
        beneficiary
        beneficiaryTokenCount
        memo
      }
      manualMintTokensEvent {
        txHash
        timestamp
        from
        beneficiary
        beneficiaryTokenCount
        memo
      }
      autoIssueEvent {
        txHash
        timestamp
        from
        beneficiary
        count
      }
      deployErc20Event {
        txHash
        timestamp
        from
        symbol
      }
      projectCreateEvent {
        txHash
        timestamp
        from
      }
      projectTransferEvent {
        txHash
        timestamp
        from
        previousOwner
        owner
      }
      operatorPermissionsSetEvent {
        txHash
        timestamp
        from
        caller
        operator
        isRevnetOperator
      }
      rulesetQueuedEvent {
        txHash
        timestamp
        from
        caller
        cycleNumber
      }
      buybackPoolEvent {
        txHash
        timestamp
        from
        caller
      }
    }
  }
}
