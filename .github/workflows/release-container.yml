name: Release container

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release-container-${{ github.ref }}
  cancel-in-progress: false

jobs:
  gate:
    name: Revalidate release invariants
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    env:
      CI: "1"
      INFURA_IPFS_API_SECRET: ci-runtime-secret
      INFURA_IPFS_PROJECT_ID: ci-runtime-project
      ENABLE_PUBLIC_IPFS_PINNING: "false"
      NODE_OPTIONS: --no-experimental-webstorage
      NEXT_PUBLIC_SITE_URL: http://127.0.0.1:4173
      NEXT_PUBLIC_BENDYSTRAW_URL: http://127.0.0.1:4174
      NEXT_PUBLIC_TESTNET_BENDYSTRAW_URL: http://127.0.0.1:4174
      NEXT_PUBLIC_INFURA_IPFS_HOSTNAME: 127.0.0.1
      NEXT_PUBLIC_MAINNET_SUBGRAPH_URL: http://127.0.0.1:4174/graphql
      NEXT_PUBLIC_OPTIMISM_SUBGRAPH_URL: http://127.0.0.1:4174/graphql
      NEXT_PUBLIC_BASE_SUBGRAPH_URL: http://127.0.0.1:4174/graphql
      NEXT_PUBLIC_ARBITRUM_SUBGRAPH_URL: http://127.0.0.1:4174/graphql
      NEXT_PUBLIC_SEPOLIA_SUBGRAPH_URL: http://127.0.0.1:4174/graphql
      NEXT_PUBLIC_OPTIMISM_SEPOLIA_SUBGRAPH_URL: http://127.0.0.1:4174/graphql
      NEXT_PUBLIC_BASE_SEPOLIA_SUBGRAPH_URL: http://127.0.0.1:4174/graphql
      NEXT_PUBLIC_ARBITRUM_SEPOLIA_SUBGRAPH_URL: http://127.0.0.1:4174/graphql
      NEXT_PUBLIC_RPC_ETHEREUM_URLS: http://127.0.0.1:4174/rpc
      NEXT_PUBLIC_RPC_OPTIMISM_URLS: http://127.0.0.1:4174/rpc
      NEXT_PUBLIC_RPC_BASE_URLS: http://127.0.0.1:4174/rpc
      NEXT_PUBLIC_RPC_ARBITRUM_URLS: http://127.0.0.1:4174/rpc
      NEXT_PUBLIC_RPC_ETHEREUM_SEPOLIA_URLS: http://127.0.0.1:4174/rpc
      NEXT_PUBLIC_RPC_OPTIMISM_SEPOLIA_URLS: http://127.0.0.1:4174/rpc
      NEXT_PUBLIC_RPC_BASE_SEPOLIA_URLS: http://127.0.0.1:4174/rpc
      NEXT_PUBLIC_RPC_ARBITRUM_SEPOLIA_URLS: http://127.0.0.1:4174/rpc
    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Check out pinned deploy-all-v6 deployment artifacts
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          repository: Bananapus/deploy-all-v6
          ref: 316e9d4d3f9e1c5b41a5df7c0ad6183abbeccc7f
          path: .contract-source/deploy-all-v6
          sparse-checkout: deployments
          persist-credentials: false

      - name: Use pinned Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Use pinned npm
        run: npm install --global npm@12.0.1 --no-audit --no-fund

      - name: Install locked dependencies
        run: npm ci --ignore-scripts

      - name: Verify installed dependency integrity
        run: npm run dependencies:check

      - name: Reject high or critical production dependency advisories
        run: npm run audit:production

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Revalidate the complete release-equivalent gate
        env:
          PROTOCOL_DEPLOYMENTS_DIR: ${{ github.workspace }}/.contract-source/deploy-all-v6
        run: npm run check

  publish:
    name: Publish signed-by-GitHub build evidence
    needs: gate
    runs-on: ubuntu-24.04
    timeout-minutes: 35
    environment: production
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Set up QEMU
        uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4.2.0

      - name: Set up Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Authenticate to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive immutable image tags and labels
        id: metadata
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=sha,format=long,prefix=sha-
            type=ref,event=tag

      - name: Build and publish image, SBOM, and provenance
        id: build
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          push: true
          tags: ${{ steps.metadata.outputs.tags }}
          labels: ${{ steps.metadata.outputs.labels }}
          platforms: linux/amd64,linux/arm64
          sbom: true
          provenance: mode=max
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NEXT_PUBLIC_SITE_URL=${{ vars.NEXT_PUBLIC_SITE_URL }}
            NEXT_PUBLIC_BENDYSTRAW_URL=${{ vars.NEXT_PUBLIC_BENDYSTRAW_URL }}
            NEXT_PUBLIC_TESTNET_BENDYSTRAW_URL=${{ vars.NEXT_PUBLIC_TESTNET_BENDYSTRAW_URL }}
            NEXT_PUBLIC_INFURA_IPFS_HOSTNAME=${{ vars.NEXT_PUBLIC_INFURA_IPFS_HOSTNAME }}
            NEXT_PUBLIC_MAINNET_SUBGRAPH_URL=${{ vars.NEXT_PUBLIC_MAINNET_SUBGRAPH_URL }}
            NEXT_PUBLIC_OPTIMISM_SUBGRAPH_URL=${{ vars.NEXT_PUBLIC_OPTIMISM_SUBGRAPH_URL }}
            NEXT_PUBLIC_BASE_SUBGRAPH_URL=${{ vars.NEXT_PUBLIC_BASE_SUBGRAPH_URL }}
            NEXT_PUBLIC_ARBITRUM_SUBGRAPH_URL=${{ vars.NEXT_PUBLIC_ARBITRUM_SUBGRAPH_URL }}
            NEXT_PUBLIC_SEPOLIA_SUBGRAPH_URL=${{ vars.NEXT_PUBLIC_SEPOLIA_SUBGRAPH_URL }}
            NEXT_PUBLIC_OPTIMISM_SEPOLIA_SUBGRAPH_URL=${{ vars.NEXT_PUBLIC_OPTIMISM_SEPOLIA_SUBGRAPH_URL }}
            NEXT_PUBLIC_BASE_SEPOLIA_SUBGRAPH_URL=${{ vars.NEXT_PUBLIC_BASE_SEPOLIA_SUBGRAPH_URL }}
            NEXT_PUBLIC_ARBITRUM_SEPOLIA_SUBGRAPH_URL=${{ vars.NEXT_PUBLIC_ARBITRUM_SEPOLIA_SUBGRAPH_URL }}
            NEXT_PUBLIC_RPC_ETHEREUM_URLS=${{ vars.NEXT_PUBLIC_RPC_ETHEREUM_URLS }}
            NEXT_PUBLIC_RPC_OPTIMISM_URLS=${{ vars.NEXT_PUBLIC_RPC_OPTIMISM_URLS }}
            NEXT_PUBLIC_RPC_BASE_URLS=${{ vars.NEXT_PUBLIC_RPC_BASE_URLS }}
            NEXT_PUBLIC_RPC_ARBITRUM_URLS=${{ vars.NEXT_PUBLIC_RPC_ARBITRUM_URLS }}
            NEXT_PUBLIC_RPC_ETHEREUM_SEPOLIA_URLS=${{ vars.NEXT_PUBLIC_RPC_ETHEREUM_SEPOLIA_URLS }}
            NEXT_PUBLIC_RPC_OPTIMISM_SEPOLIA_URLS=${{ vars.NEXT_PUBLIC_RPC_OPTIMISM_SEPOLIA_URLS }}
            NEXT_PUBLIC_RPC_BASE_SEPOLIA_URLS=${{ vars.NEXT_PUBLIC_RPC_BASE_SEPOLIA_URLS }}
            NEXT_PUBLIC_RPC_ARBITRUM_SEPOLIA_URLS=${{ vars.NEXT_PUBLIC_RPC_ARBITRUM_SEPOLIA_URLS }}

      - name: Attest published image digest
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-name: ghcr.io/${{ github.repository }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true
