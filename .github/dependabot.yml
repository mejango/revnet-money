version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: tuesday
      time: "09:00"
      timezone: America/Sao_Paulo
    open-pull-requests-limit: 1
    cooldown:
      default-days: 7
      semver-minor-days: 14
      semver-patch-days: 7
    versioning-strategy: lockfile-only
    allow:
      - dependency-type: all
        update-types:
          - version-update:semver-minor
          - version-update:semver-patch
    # These lines need coordinated source or formatting migrations rather than
    # automated manifest-only updates.
    ignore:
      - dependency-name: prettier
        versions: [">=3.9.6 <4"]
      - dependency-name: prettier-plugin-organize-imports
        versions: [">=4.3.0 <5"]
      - dependency-name: prettier-plugin-tailwindcss
        versions: [">=0.8.0 <1"]
      - dependency-name: typescript
        versions: [">=5.9.0 <6"]
      - dependency-name: "@tanstack/react-query"
        versions: [">=5.101.4 <6"]
      - dependency-name: recharts
        versions: [">=3.9.0 <4"]
      - dependency-name: wagmi
        versions: [">=2.18.0 <3"]
      - dependency-name: "@rolldown/binding-linux-x64-gnu"
        versions: [">=1.2.0 <2"]
    labels: [dependencies]
    commit-message:
      prefix: "chore(deps)"
    groups:
      routine:
        applies-to: version-updates
        patterns: ["*"]
        update-types: [minor, patch]
      security:
        applies-to: security-updates
        patterns: ["*"]

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: tuesday
      time: "09:00"
      timezone: America/Sao_Paulo
    open-pull-requests-limit: 1
    cooldown:
      default-days: 7
    allow:
      - dependency-type: all
        update-types:
          - version-update:semver-minor
          - version-update:semver-patch
    labels: [dependencies, ci]
    commit-message:
      prefix: "chore(actions)"
    groups:
      routine:
        applies-to: version-updates
        patterns: ["*"]
        update-types: [minor, patch]
      security:
        applies-to: security-updates
        patterns: ["*"]

  - package-ecosystem: docker
    directory: /
    schedule:
      interval: weekly
      day: tuesday
      time: "09:00"
      timezone: America/Sao_Paulo
    open-pull-requests-limit: 1
    cooldown:
      default-days: 7
    allow:
      - dependency-type: all
        update-types:
          - version-update:semver-minor
          - version-update:semver-patch
    labels: [dependencies, deployment]
    commit-message:
      prefix: "chore(container)"
    groups:
      routine:
        applies-to: version-updates
        patterns: ["*"]
        update-types: [minor, patch]
      security:
        applies-to: security-updates
        patterns: ["*"]
