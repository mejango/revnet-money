version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: tuesday
      time: "09:00"
      timezone: America/Sao_Paulo
    # Routine version updates are reviewed deliberately. A zero limit disables
    # version-update PRs without disabling Dependabot security updates.
    open-pull-requests-limit: 0
    labels: [dependencies]
    commit-message:
      prefix: "chore(deps)"
    groups:
      security:
        applies-to: security-updates
        patterns: ["*"]

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: tuesday
      time: "09:00"
      timezone: America/Sao_Paulo
    open-pull-requests-limit: 0
    labels: [dependencies, ci]
    commit-message:
      prefix: "chore(actions)"
    groups:
      security:
        applies-to: security-updates
        patterns: ["*"]

  - package-ecosystem: docker
    directory: /
    schedule:
      interval: weekly
      day: tuesday
      time: "09:00"
      timezone: America/Sao_Paulo
    open-pull-requests-limit: 0
    labels: [dependencies, deployment]
    commit-message:
      prefix: "chore(container)"
    groups:
      security:
        applies-to: security-updates
        patterns: ["*"]
