version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: America/New_York
    open-pull-requests-limit: 6
    labels: [dependencies]
    commit-message:
      prefix: "chore(deps)"
    groups:
      production-non-major:
        dependency-type: production
        update-types: [minor, patch]
      development-non-major:
        dependency-type: development
        update-types: [minor, patch]

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:15"
      timezone: America/New_York
    open-pull-requests-limit: 3
    labels: [dependencies, ci]
    commit-message:
      prefix: "chore(actions)"
    groups:
      actions-non-major:
        update-types: [minor, patch]

  - package-ecosystem: docker
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:30"
      timezone: America/New_York
    open-pull-requests-limit: 3
    labels: [dependencies, deployment]
    commit-message:
      prefix: "chore(container)"
    groups:
      docker-non-major:
        update-types: [minor, patch]
